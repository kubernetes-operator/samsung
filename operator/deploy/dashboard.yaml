# TrafficPolicy 대시보드 배포 매니페스트.
#
# 읽기 전용 웹 UI다 — ClusterRole은 trafficpolicies에 대한 get/list/watch만 부여하고
# 쓰기 verb(create/update/patch/delete)는 없다. 오퍼레이터 본체(actuator/policy)와
# 완전히 분리된 별도 Deployment로 배포하므로, 대시보드가 죽어도 오퍼레이터 동작에
# 영향이 없고, 반대로 오퍼레이터가 죽어도 대시보드는 마지막으로 관측한 CR 상태를 계속 보여준다.
#
# 특정 네임스페이스만 보고 싶으면 Deployment의 WATCH_NAMESPACE 값을 채우고,
# 아래 ClusterRole/ClusterRoleBinding을 그 네임스페이스의 Role/RoleBinding으로 좁혀도 된다.
#
# 이미지 빌드/푸시: docker build -f Dockerfile.dashboard -t <registry>/traffic-policy-dashboard:latest .
#                  docker push <registry>/traffic-policy-dashboard:latest
# 아래 image 값은 이 클러스터에 실제로 연결된 내부 레지스트리(registry.local.cloud:5000) 기준이다.
# 다른 환경에 배포한다면 image 값을 그 환경의 레지스트리로 바꿀 것.

apiVersion: v1
kind: Namespace
metadata:
  name: traffic-policy-dashboard
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: traffic-policy-dashboard
  namespace: traffic-policy-dashboard
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: traffic-policy-dashboard-viewer
rules:
  - apiGroups: ["ops.example.com"]
    resources: ["trafficpolicies"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: traffic-policy-dashboard-viewer
subjects:
  - kind: ServiceAccount
    name: traffic-policy-dashboard
    namespace: traffic-policy-dashboard
roleRef:
  kind: ClusterRole
  name: traffic-policy-dashboard-viewer
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: traffic-policy-dashboard
  namespace: traffic-policy-dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: traffic-policy-dashboard
  template:
    metadata:
      labels:
        app: traffic-policy-dashboard
    spec:
      serviceAccountName: traffic-policy-dashboard
      containers:
        - name: dashboard
          image: registry.local.cloud:5000/traffic-policy-dashboard:latest
          ports:
            - containerPort: 8080
          env:
            - name: WATCH_NAMESPACE
              value: ""  # 비우면 클러스터 전체. 특정 네임스페이스만 보려면 채우고 위 RBAC도 좁힐 것.
            - name: HUBBLE_RELAY_ADDR
              value: "hubble-relay.kube-system.svc.cluster.local:80"  # /flows 페이지가 조회할 hubble-relay 주소.
            # 이 대시보드는 test2.studiobasa.com/traffic-dashboard 아래로 노출된다(HTTPRoute가
            # 프리픽스를 떼고 백엔드로 전달). 라우트는 '/','/flows'로 두되, HTML 링크에는 이
            # 프리픽스를 붙여야 브라우저의 페이지 내 이동(nav/토글)이 프리픽스 밖으로 새지 않는다.
            - name: DASHBOARD_URL_PREFIX
              value: "/traffic-dashboard"
            # HTTP Basic 인증 자격증명. 값은 매니페스트/이미지에 넣지 않고 Secret에서 주입한다.
            # 이 Secret은 저장소에 커밋하지 않으며, 배포 담당자가 직접 만든다(예):
            #   kubectl -n traffic-policy-dashboard create secret generic traffic-policy-dashboard-auth \
            #     --from-literal=username='<원하는 아이디>' --from-literal=password='<강력한 비밀번호>'
            # 이 두 env가 비면 대시보드는 모든 경로를 503으로 막는다(fail-closed) — /healthz만 예외.
            - name: DASHBOARD_USERNAME
              valueFrom:
                secretKeyRef:
                  name: traffic-policy-dashboard-auth
                  key: username
            - name: DASHBOARD_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: traffic-policy-dashboard-auth
                  key: password
          readinessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 3
          livenessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 10
          resources:
            requests: { cpu: "10m", memory: "64Mi" }
            limits: { cpu: "200m", memory: "128Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: traffic-policy-dashboard
  namespace: traffic-policy-dashboard
spec:
  selector:
    app: traffic-policy-dashboard
  ports:
    - port: 80
      targetPort: 8080
---
# 클러스터의 기존 Gateway(default/gateway, GatewayClass: nginx)에 연결해 브라우저로
# 접근 가능하게 한다. test1/test2.studiobasa.com은 와일드카드가 아니라 개별로 등록된
# DNS 레코드라서, 새 서브도메인을 만드는 대신 이미 다른 앱들(gitea/demo-app/monitoring 등)이
# 쓰는 것과 같은 방식으로 test2.studiobasa.com 아래 경로(/traffic-dashboard)를 붙인다.
# 공개 호스트로 노출되므로 앱 레벨 HTTP Basic 인증으로 보호한다(위 Deployment의
# DASHBOARD_USERNAME/PASSWORD, traffic-policy-dashboard-auth Secret). 더 강한 통제가
# 필요하면 게이트웨이 레벨 IP 제한/OIDC 프록시를 추가로 검토.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: traffic-policy-dashboard-route
  namespace: traffic-policy-dashboard
spec:
  parentRefs:
    - name: gateway
      namespace: default
      sectionName: http
    - name: gateway
      namespace: default
      sectionName: https
  hostnames:
    - "test2.studiobasa.com"
  rules:
    - matches:
        - path: { type: PathPrefix, value: /traffic-dashboard }
      # 대시보드 앱 자체는 서브패스를 모르므로(라우트가 "/", "/api/policies" 등 절대 경로),
      # Gateway 단에서 프리픽스를 제거해 백엔드에는 항상 "/"부터 시작하는 경로만 전달한다.
      # (nginx Gateway Fabric은 PathPrefix 매치를 자동으로 strip하지 않는다 — 명시적
      # URLRewrite 필터가 없으면 proxy_pass에 원본 경로가 그대로 전달됨을 실측으로 확인.)
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: traffic-policy-dashboard
          port: 80
