# TrafficPolicy 대시보드 배포 매니페스트.
#
# 읽기 전용 웹 UI다 — ClusterRole은 trafficpolicies에 대한 get/list/watch만 부여하고
# 쓰기 verb(create/update/patch/delete)는 없다. 오퍼레이터 본체(actuator/policy)와
# 완전히 분리된 별도 Deployment로 배포하므로, 대시보드가 죽어도 오퍼레이터 동작에
# 영향이 없고, 반대로 오퍼레이터가 죽어도 대시보드는 마지막으로 관측한 CR 상태를 계속 보여준다.
#
# 특정 네임스페이스만 보고 싶으면 Deployment의 WATCH_NAMESPACE 값을 채우고,
# 아래 ClusterRole/ClusterRoleBinding을 그 네임스페이스의 Role/RoleBinding으로 좁혀도 된다.
#
# 이미지 빌드/푸시(GitOps: :latest 대신 버전 태그 사용 — 태그를 올려야 ArgoCD가 재배포):
#   docker build -f Dockerfile.dashboard -t registry.local.cloud:5000/traffic-policy-dashboard:v0.1.0 .
#   docker push registry.local.cloud:5000/traffic-policy-dashboard:v0.1.0
# 코드/프론트 변경 시: 새 버전으로 빌드·푸시하고 아래 image 태그를 올린 뒤 커밋 → ArgoCD가 자동 동기화.
# 아래 image 값은 이 클러스터에 실제로 연결된 내부 레지스트리(registry.local.cloud:5000) 기준이다.

apiVersion: v1
kind: Namespace
metadata:
  name: traffic-policy-dashboard
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: traffic-policy-dashboard
  namespace: traffic-policy-dashboard
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: traffic-policy-dashboard-viewer
rules:
  - apiGroups: ["ops.example.com"]
    resources: ["trafficpolicies"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: traffic-policy-dashboard-viewer
subjects:
  - kind: ServiceAccount
    name: traffic-policy-dashboard
    namespace: traffic-policy-dashboard
roleRef:
  kind: ClusterRole
  name: traffic-policy-dashboard-viewer
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: traffic-policy-dashboard
  namespace: traffic-policy-dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: traffic-policy-dashboard
  template:
    metadata:
      labels:
        app: traffic-policy-dashboard
    spec:
      serviceAccountName: traffic-policy-dashboard
      # 이미지가 uid 1001로 실행되므로, 마운트한 자격증명 볼륨을 이 그룹이 쓸 수 있게 한다.
      securityContext:
        fsGroup: 1001
      containers:
        - name: dashboard
          image: registry.local.cloud:5000/traffic-policy-dashboard:v0.1.8
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: credentials
              mountPath: /data
          env:
            - name: WATCH_NAMESPACE
              value: ""  # 비우면 클러스터 전체. 특정 네임스페이스만 보려면 채우고 위 RBAC도 좁힐 것.
            - name: HUBBLE_RELAY_ADDR
              value: "hubble-relay.kube-system.svc.cluster.local:80"  # /flows 페이지가 조회할 hubble-relay 주소.
            # 이 대시보드는 test2.studiobasa.com/traffic-dashboard 아래로 노출된다(HTTPRoute가
            # 프리픽스를 떼고 백엔드로 전달). 라우트는 '/','/flows'로 두되, HTML 링크에는 이
            # 프리픽스를 붙여야 브라우저의 페이지 내 이동(nav/토글)이 프리픽스 밖으로 새지 않는다.
            - name: DASHBOARD_URL_PREFIX
              value: "/traffic-dashboard"
            # 로그인 자격증명 저장 파일 경로(아래 PVC 마운트). 여기 파일이 없으면 기본
            # admin/password로 시작하고, /settings에서 바꾸면 이 파일에 저장돼 재기동에도 유지된다.
            # 대시보드는 이 볼륨에만 쓰고 클러스터 API에는 여전히 아무것도 쓰지 않는다.
            - name: DASHBOARD_CREDENTIALS_PATH
              value: /data/credentials.json
            # (선택) 최초 부트스트랩용 자격증명. Secret이 있으면 저장 파일이 처음 만들어질 때
            # 그 값으로 시드한다(없으면 admin/password). Secret은 커밋하지 않으며 없어도 기동된다
            # (optional: true). 예: kubectl -n traffic-policy-dashboard create secret generic \
            #   traffic-policy-dashboard-auth --from-literal=username=admin --from-literal=password='...'
            - name: DASHBOARD_USERNAME
              valueFrom:
                secretKeyRef:
                  name: traffic-policy-dashboard-auth
                  key: username
                  optional: true
            - name: DASHBOARD_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: traffic-policy-dashboard-auth
                  key: password
                  optional: true
          readinessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 3
          livenessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 10
          resources:
            # /flows는 요청 시 hubble CLI(별도 Go 프로세스, 큰 RSS)를 띄운다. 코드 쪽에서
            # single-flight + TTL 캐시로 동시 서브프로세스를 1개로 제한하지만, uvicorn+hubble가
            # 겹치는 순간을 위해 상한에 여유를 둔다(128Mi는 정상 사용에서도 빠듯해 OOM 관측됨).
            requests: { cpu: "10m", memory: "96Mi" }
            limits: { cpu: "300m", memory: "256Mi" }
      volumes:
        - name: credentials
          persistentVolumeClaim:
            claimName: traffic-policy-dashboard-credentials
---
# 로그인 자격증명(username + 비밀번호 해시 + 세션 키)을 담는 파일을 보존한다. 이게 있어야
# /settings에서 바꾼 비밀번호가 파드 재기동/재배포에도 유지된다. 없으면(또는 쓰기 불가면)
# 대시보드는 메모리로만 동작해 재기동 시 기본 admin/password로 되돌아간다.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: traffic-policy-dashboard-credentials
  namespace: traffic-policy-dashboard
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 64Mi
---
apiVersion: v1
kind: Service
metadata:
  name: traffic-policy-dashboard
  namespace: traffic-policy-dashboard
spec:
  selector:
    app: traffic-policy-dashboard
  ports:
    - port: 80
      targetPort: 8080
---
# 클러스터의 기존 Gateway(default/gateway, GatewayClass: nginx)에 연결해 브라우저로
# 접근 가능하게 한다. test1/test2.studiobasa.com은 와일드카드가 아니라 개별로 등록된
# DNS 레코드라서, 새 서브도메인을 만드는 대신 이미 다른 앱들(gitea/demo-app/monitoring 등)이
# 쓰는 것과 같은 방식으로 test2.studiobasa.com 아래 경로(/traffic-dashboard)를 붙인다.
# 공개 호스트로 노출되므로 앱 레벨 로그인(폼+세션 쿠키, 기본 admin/password, /settings에서
# 변경)으로 보호한다. 스크립트용 HTTP Basic도 같은 자격증명으로 허용한다. 더 강한 통제가
# 필요하면 게이트웨이 레벨 IP 제한/OIDC 프록시를 추가로 검토.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: traffic-policy-dashboard-route
  namespace: traffic-policy-dashboard
spec:
  parentRefs:
    - name: gateway
      namespace: default
      sectionName: http
    - name: gateway
      namespace: default
      sectionName: https
  hostnames:
    - "test2.studiobasa.com"
  rules:
    - matches:
        - path: { type: PathPrefix, value: /traffic-dashboard }
      # 대시보드 앱 자체는 서브패스를 모르므로(라우트가 "/", "/api/policies" 등 절대 경로),
      # Gateway 단에서 프리픽스를 제거해 백엔드에는 항상 "/"부터 시작하는 경로만 전달한다.
      # (nginx Gateway Fabric은 PathPrefix 매치를 자동으로 strip하지 않는다 — 명시적
      # URLRewrite 필터가 없으면 proxy_pass에 원본 경로가 그대로 전달됨을 실측으로 확인.)
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: traffic-policy-dashboard
          port: 80
